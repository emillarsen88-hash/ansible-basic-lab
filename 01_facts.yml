---
- name: Facts Playbook
  hosts: copenhagen
  gather_facts: true
  vars:
    add: "{{ansible_facts['default_ipv4']['address']}}"
    alias: "{{ansible_facts['default_ipv4']['alias']}}"
    broadcast: "{{ansible_facts['default_ipv4']['broadcast']}}"
  tasks:
    - name: Show Facts
      ansible.builtin.debug:
        var: ansible_facts
    - name: Show Default IP Address
      ansible.builtin.debug:
        msg: "{{ add }} and {{ alias }} and {{ broadcast }}"

    - name: Create facts
      ansible.builtin.set_fact:
        ip: "{{ ansible_facts['default_ipv4']['address'] }}"

    - name: Show Fact
      ansible.builtin.debug:
        var: ip
